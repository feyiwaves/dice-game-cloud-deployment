name: Deploy Dice Game

on:
    push:
        branches:
           -main

jobs:
    deploy:
        runs-on: ubuntu:latest
        
        steps:
        - name: Checkout repository
          uses: actions/checkout@v3

        - name: Prepare deployment artifacts
          uses: aws-actions/configure-aws-credentials@v2
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ secrets.AWS_REGION }}
      
        - name: Deploying application to Amazon S3 
          uses: dvelasquez/deploy-s3-action@main
          with:
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
            AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
            BUCKET_PATH: "" # Or to upload a pull_request: "/pr/${{github.event.number}}"
            DIST_LOCATION_CODE: ./dist 

        - name: Update deployed application 
          run: aws cloudfront create-invalidation --distribution-id YOUR_DISTRIBUTION_ID --paths "/*"
